name: Build Flutter App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        default: 'v1.0.0'

env:
  FLUTTER_VERSION: '3.x'
  GO_VERSION: '1.25'

jobs:
  # ============================================
  # Build Go Mobile Libraries
  # ============================================
  build-mobile-libs:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Extract Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          go get golang.org/x/mobile/bind@latest

      - name: Build Android AAR
        run: |
          chmod +x scripts/build-mobile.sh
          ./scripts/build-mobile.sh

      - name: Upload Android AAR
        uses: actions/upload-artifact@v4
        with:
          name: mimic-android-aar
          path: mobile/libs/mimic.aar

  # ============================================
  # Build Flutter Android App
  # ============================================
  build-flutter-android:
    runs-on: ubuntu-latest
    needs: build-mobile-libs
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Download Go Mobile Libraries
        uses: actions/download-artifact@v4
        with:
          name: mimic-android-aar
          path: mimic_app/android/app/libs/

      - name: Install gomobile for Flutter build
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          go get golang.org/x/mobile/bind@latest

      - name: Build Go Mobile for Android
        working-directory: .
        run: |
          chmod +x scripts/build-mobile.sh
          ./scripts/build-mobile.sh
          cp mobile/libs/mimic.aar mimic_app/android/app/libs/

      - name: Install Flutter dependencies
        working-directory: mimic_app
        run: flutter pub get

      - name: Build Android APK
        working-directory: mimic_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MimicApp-Android.apk
          path: mimic_app/build/app/outputs/flutter-apk/app-release.apk

  # ============================================
  # Build Flutter iOS App
  # ============================================
  build-flutter-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          go get golang.org/x/mobile/bind@latest

      - name: Build Go Mobile for iOS
        working-directory: .
        run: |
          chmod +x scripts/build-mobile.sh
          ./scripts/build-mobile.sh
          cp mobile/libs/Mimic.xcframework mimic_app/ios/Frameworks/

      - name: Install Flutter dependencies
        working-directory: mimic_app
        run: flutter pub get

      - name: Build iOS IPA
        working-directory: mimic_app
        run: |
          flutter build ios --release --no-codesign
          # Create IPA from .app
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r MimicApp-iOS.ipa Payload

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: MimicApp-iOS.ipa
          path: MimicApp-iOS.ipa

  # ============================================
  # Build Flutter Windows App
  # ============================================
  build-flutter-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Install Flutter dependencies
        working-directory: mimic_app
        run: flutter pub get

      - name: Build Windows
        working-directory: mimic_app
        run: flutter build windows --release

      - name: Create distribution package
        working-directory: mimic_app
        run: |
          mkdir dist
          cp build/windows/runner/Release/* dist/
          cp -r build/windows/runner/Release/data/flutter_assets dist/
          cp -r build/windows/runner/Release/data/icudtl.dat dist/
        shell: bash

      - name: Upload Windows App
        uses: actions/upload-artifact@v4
        with:
          name: MimicApp-Windows.zip
          path: mimic_app/dist/

  # ============================================
  # Build Flutter Linux App
  # ============================================
  build-flutter-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Enable Linux desktop support
        run: flutter config --enable-linux-desktop

      - name: Install Flutter dependencies
        working-directory: mimic_app
        run: flutter pub get

      - name: Build Linux
        working-directory: mimic_app
        run: flutter build linux --release

      - name: Create distribution package
        working-directory: mimic_app
        run: |
          mkdir dist
          cp -r build/linux/x64/release/bundle/* dist/

      - name: Upload Linux App
        uses: actions/upload-artifact@v4
        with:
          name: MimicApp-Linux.tar.gz
          path: mimic_app/dist/

  # ============================================
  # Build Flutter macOS App
  # ============================================
  build-flutter-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Enable macOS desktop support
        run: flutter config --enable-macos-desktop

      - name: Install Flutter dependencies
        working-directory: mimic_app
        run: flutter pub get

      - name: Build macOS
        working-directory: mimic_app
        run: flutter build macos --release

      - name: Create distribution package
        working-directory: mimic_app
        run: |
          mkdir dist
          cp -r build/macos/Build/Products/Release/MimicApp.app dist/

      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        with:
          name: MimicApp-macOS.zip
          path: mimic_app/dist/
