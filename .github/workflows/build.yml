name: Build Flutter App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        default: 'v1.0.0'

env:
  FLUTTER_VERSION: '3.x'
  GO_VERSION: '1.25'

jobs:
  # ============================================
  # Build Flutter Android App
  # ============================================
  build-flutter-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v3
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install gomobile for Flutter build
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          go get golang.org/x/mobile/bind@latest

      - name: Build Go Mobile for Android
        working-directory: .
        run: |
          chmod +x scripts/build-mobile.sh
          ./scripts/build-mobile.sh
          cp mobile/libs/mimic.aar mimic_app/android/app/libs/

      - name: Install Flutter dependencies
        working-directory: mimic_app
        run: flutter pub get

      - name: Build Android APK
        working-directory: mimic_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: MimicApp-Android.apk
          path: mimic_app/build/app/outputs/flutter-apk/app-release.apk

  # ============================================
  # Build Flutter iOS App
  # ============================================
  build-flutter-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v3
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          go get golang.org/x/mobile/bind@latest

      - name: Build Go Mobile for iOS
        working-directory: .
        run: |
          chmod +x scripts/build-mobile.sh
          ./scripts/build-mobile.sh
          mkdir -p mimic_app/ios/Frameworks
          cp -R mobile/libs/Mimic.xcframework mimic_app/ios/Frameworks/

      - name: Install Flutter dependencies
        working-directory: mimic_app
        run: flutter pub get

      - name: Build iOS IPA
        working-directory: mimic_app
        run: |
          flutter build ios --release --no-codesign
          # Create IPA from .app
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -r ../../../MimicApp-iOS.ipa Payload

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v5
        with:
          name: MimicApp-iOS
          path: MimicApp-iOS.ipa

  # ============================================
  # Build Flutter Windows App
  # ============================================
  build-flutter-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install MinGW-w64
        run: |
          choco install mingw --no-progress -y
          refreshenv

      - name: Set up Flutter
        uses: subosito/flutter-action@v3
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Install Flutter dependencies
        working-directory: mimic_app
        run: flutter pub get

      - name: Build Go CGO for Windows
        working-directory: .
        shell: pwsh
        run: |
          .\scripts\build-desktop.ps1
          # Copy DLL to Windows runner directory
          Copy-Item -Path "desktop\libs\mimic.dll" -Destination "mimic_app\windows\runner\" -Force

      - name: Build Windows
        working-directory: mimic_app
        run: flutter build windows --release

      - name: Create distribution package
        working-directory: mimic_app
        run: |
          mkdir dist
          cp build/windows/x64/runner/Release/mimic_app.exe dist/
          cp -r build/windows/x64/runner/Release/data dist/
          # Copy all required DLLs from the build output
          cp build/windows/x64/runner/Release/*.dll dist/
          # Also copy the Go DLL
          cp ../desktop/libs/mimic.dll dist/

      - name: Upload Windows App
        uses: actions/upload-artifact@v5
        with:
          name: MimicApp-Windows
          path: mimic_app/dist/

  # ============================================
  # Build Flutter Linux App
  # ============================================
  build-flutter-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v3
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev gcc mingw-w64

      - name: Enable Linux desktop support
        run: flutter config --enable-linux-desktop

      - name: Install Flutter dependencies
        working-directory: mimic_app
        run: flutter pub get

      - name: Build Go CGO for Linux
        working-directory: .
        run: |
          chmod +x scripts/build-desktop.sh
          ./scripts/build-desktop.sh

      - name: Build Linux
        working-directory: mimic_app
        run: flutter build linux --release

      - name: Create distribution package
        working-directory: mimic_app
        run: |
          mkdir dist
          cp -r build/linux/x64/release/bundle/* dist/
          cp ../desktop/libs/libmimic.so dist/

      - name: Upload Linux App
        uses: actions/upload-artifact@v5
        with:
          name: MimicApp-Linux
          path: mimic_app/dist/

  # ============================================
  # Build Flutter macOS App
  # ============================================
  build-flutter-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v3
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Enable macOS desktop support
        run: flutter config --enable-macos-desktop

      - name: Install Flutter dependencies
        working-directory: mimic_app
        run: flutter pub get

      - name: Build Go CGO for macOS
        working-directory: .
        run: |
          chmod +x scripts/build-desktop.sh
          ./scripts/build-desktop.sh

      - name: Build macOS
        working-directory: mimic_app
        run: flutter build macos --release

      - name: Copy Go library to bundle
        working-directory: .
        run: |
          chmod +x scripts/copy-go-lib-macos.sh
          ./scripts/copy-go-lib-macos.sh

      - name: Create distribution package
        working-directory: mimic_app
        run: |
          mkdir dist
          cp -r build/macos/Build/Products/Release/mimic_app.app dist/
          cp ../desktop/libs/libmimic.dylib dist/

      - name: Upload macOS App
        uses: actions/upload-artifact@v5
        with:
          name: MimicApp-macOS
          path: mimic_app/dist/
