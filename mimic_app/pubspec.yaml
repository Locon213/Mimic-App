name: mimic_app
description: "Mimic Protocol Client - Cross-platform VPN client built with Flutter"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.5

  # UI Components & Styling
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_animate: ^4.3.0
  
  # Icons
  font_awesome_flutter: ^11.0.0
  
  # Storage
  shared_preferences: ^2.5.4
  path_provider: ^2.1.1
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.1
  package_info_plus: ^9.0.0
  ffi: ^2.1.0
  
  # System Tray & Background Mode (Desktop)
  system_tray: ^2.0.3
  
  # Auto Launch
  auto_start_flutter: ^1.1.0
  
  # YAML Editor
  yaml: ^3.1.2
  code_text_field: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  ffigen: ^20.1.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "../assets/icon.png"
  image_path_android: "../assets/icon.png"
  image_path_ios: "../assets/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "../assets/icon.png"
  
  windows:
    generate: true
    image_path: "../assets/icon.png"
    icon_size: 48
  
  macos:
    generate: true
    image_path: "../assets/icon.png"
  
  linux:
    generate: true
    image_path: "../assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
