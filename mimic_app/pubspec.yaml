name: mimic_app
description: "Mimic Protocol Client - Cross-platform VPN client built with Flutter"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9

  # UI Components & Styling
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  
  # Icons
  font_awesome_flutter: ^10.6.0
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Charts & Visualization
  fl_chart: ^1.2.0
  
  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.1
  package_info_plus: ^5.0.1
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  ffigen: ^11.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "../assets/icon.png"
  image_path_android: "../assets/icon.png"
  image_path_ios: "../assets/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "../assets/icon.png"
  
  windows:
    generate: true
    image_path: "../assets/icon.png"
    icon_size: 48
  
  macos:
    generate: true
    image_path: "../assets/icon.png"
  
  linux:
    generate: true
    image_path: "../assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
